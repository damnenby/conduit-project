services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/nest/Dockerfile
    environment:
      DATABASE_URL: file:/data/dev.db
      JWT_SECRET: conduit-dev-secret
    ports:
      - '3000:3000'
    volumes:
      - conduit-data:/data
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
    command: >
      sh -c "cd libs/database/sqlite
      && pnpm exec prisma migrate deploy --config prisma.config.ts
      && cd /app
      && pnpm --filter nest start"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/vue/Dockerfile
    environment:
      VITE_API_PROXY_TARGET: http://backend:3000
    ports:
      - '5173:5173'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  conduit-data:
